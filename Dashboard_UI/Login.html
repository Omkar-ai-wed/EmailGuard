<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EmailGuard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-900 to-blue-900/20">
    
    <div class="w-full max-w-md space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="text-center">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg glow mb-6">
                <span class="material-symbols-outlined text-4xl text-white">shield</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Welcome Back</h1>
            <p class="text-slate-400 mt-2">Sign in to protect your professional inbox</p>
        </div>

        <div class="glass p-8 rounded-3xl space-y-6 glow">
            <div id="login-error" class="hidden p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl">
                Invalid credentials. Please try again.
            </div>

            <form id="login-form" class="space-y-4">
                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Username</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">person</span>
                        <input id="username" type="text" required class="w-full pl-12 pr-4 py-3.5 bg-slate-800/50 rounded-2xl border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-600" placeholder="e.g. analyst">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">lock</span>
                        <input id="password" type="password" required class="w-full pl-12 pr-4 py-3.5 bg-slate-800/50 rounded-2xl border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-600" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm px-1">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 rounded border-slate-700 bg-slate-800 text-blue-600 focus:ring-blue-500/20">
                        <span class="text-slate-400 group-hover:text-slate-300">Remember me</span>
                    </label>
                    <a href="#" class="text-blue-400 hover:text-blue-300 font-semibold">Forgot password?</a>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-bold transition-all active:scale-[0.98] shadow-lg shadow-blue-600/20 flex items-center justify-center gap-2">
                    <span>Sign In</span>
                    <span class="material-symbols-outlined text-xl">login</span>
                </button>
            </form>

            <div class="relative py-4">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#1e293b]/70 px-4 text-slate-500 font-bold">Or Demo Access</span></div>
            </div>

            <button onclick="enterDemo()" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-2xl font-semibold border border-slate-700 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                <span>View Live Demo</span>
                <span class="material-symbols-outlined text-xl">visibility</span>
            </button>
        </div>

        <p class="text-center text-slate-500 text-sm">
            Don't have an account? <a href="Signup.html" class="text-blue-400 hover:text-blue-300 font-bold underline decoration-blue-400/30 underline-offset-4">Create one</a>
        </p>
    </div>

    <script src="dashboard_core.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const error = document.getElementById('login-error');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Signing in...';
            error.classList.add('hidden');

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${EmailGuard.API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('eg_token', data.access_token);
                    window.location.href = 'Overview_Dashboard.html';
                } else {
                    error.classList.remove('hidden');
                }
            } catch (err) {
                error.textContent = "Cannot connect to server. Check your connection.";
                error.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });

        function enterDemo() {
            localStorage.removeItem('eg_token'); // Ensure we're in demo mode
            window.location.href = 'Overview_Dashboard.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EmailGuard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-slate-900 via-slate-900 to-blue-900/20">
    
    <div class="w-full max-w-md space-y-8 animate-in fade-in slide-in-from-bottom-4 duration-700">
        <div class="text-center">
            <div class="w-16 h-16 bg-emerald-600 rounded-2xl mx-auto flex items-center justify-center shadow-lg glow mb-6" style="box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);">
                <span class="material-symbols-outlined text-4xl text-white">person_add</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight">Create Account</h1>
            <p class="text-slate-400 mt-2">Join EmailGuard to secure your inbox</p>
        </div>

        <div class="glass p-8 rounded-3xl space-y-6 glow">
            <div id="signup-error" class="hidden p-4 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-xl">
                Error creating account. Please check your details.
            </div>
            <div id="signup-success" class="hidden p-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 text-sm rounded-xl">
                Account created successfully! Redirecting to login...
            </div>

            <form id="signup-form" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1">Username</label>
                        <input id="username" type="text" required class="w-full px-4 py-3.5 bg-slate-800/50 rounded-2xl border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-600" placeholder="johndoe">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-300 ml-1">Role</label>
                        <select id="role" class="w-full px-4 py-3.5 bg-slate-800/50 rounded-2xl border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all text-slate-300">
                            <option value="analyst">Analyst</option>
                            <option value="viewer">Viewer</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">mail</span>
                        <input id="email" type="email" required class="w-full pl-12 pr-4 py-3.5 bg-slate-800/50 rounded-2xl border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-600" placeholder="john@company.com">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-sm font-semibold text-slate-300 ml-1">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl">lock</span>
                        <input id="password" type="password" required minlength="6" class="w-full pl-12 pr-4 py-3.5 bg-slate-800/50 rounded-2xl border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-600" placeholder="••••••••">
                    </div>
                    <p class="text-[10px] text-slate-500 ml-1">Must be at least 6 characters</p>
                </div>

                <button type="submit" id="submit-btn" class="w-full py-4 bg-blue-600 hover:bg-blue-500 text-white rounded-2xl font-bold transition-all active:scale-[0.98] shadow-lg shadow-blue-600/20 flex items-center justify-center gap-2 mt-4">
                    <span>Create Account</span>
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
                </button>
            </form>

            <div class="relative py-2">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-700"></div></div>
                <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#1e293b]/70 px-4 text-slate-500 font-bold">Already have an account?</span></div>
            </div>

            <a href="Login.html" class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-2xl font-semibold border border-slate-700 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
                <span>Back to Login</span>
                <span class="material-symbols-outlined text-xl">login</span>
            </a>
        </div>
    </div>

    <script src="dashboard_core.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const error = document.getElementById('signup-error');
            const success = document.getElementById('signup-success');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Creating...';
            error.classList.add('hidden');
            success.classList.add('hidden');

            const payload = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            try {
                const response = await fetch(`${EmailGuard.API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    success.classList.remove('hidden');
                    setTimeout(() => {
                        window.location.href = 'Login.html';
                    }, 2000);
                } else {
                    const data = await response.json();
                    error.textContent = data.detail || "Error creating account.";
                    error.classList.remove('hidden');
                }
            } catch (err) {
                error.textContent = "Cannot connect to server. Check your connection.";
                error.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
